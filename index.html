<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-Tabelog: 한국 맛집 랭킹 & 검색</title>
  
  <!-- AdSense Integration -->
  <meta name="google-adsense-account" content="ca-pub-2373698130447430">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2373698130447430"
     crossorigin="anonymous"></script>

  <link href='/style.css' rel='stylesheet'>
  <!-- Google Fonts for Korean (Noto Sans KR) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <a href="/" onclick="handleNav(event, 'home')">
          <span class="logo-icon">🍽️</span>
          <span class="logo-text">K-Tabelog</span>
        </a>
      </div>
      <div class="search-bar">
        <select id="area-select">
          <option value="">전국</option>
          <option value="Seoul">서울</option>
          <option value="Busan">부산</option>
          <option value="Jeju">제주</option>
          <option value="Incheon">인천</option>
        </select>
        <input type="text" id="search-input" placeholder="맛집, 음식, 지역 검색...">
        <button id="search-btn">검색</button>
      </div>
      <nav class="user-nav">
        <a href="#">로그인</a>
        <a href="#" class="btn-primary">회원가입</a>
      </nav>
    </div>
  </header>

  <nav class="category-nav">
    <div class="nav-inner">
      <a href="#" class="active">전체</a>
      <a href="#" data-cat="Korean">한식</a>
      <a href="#" data-cat="Japanese">일식</a>
      <a href="#" data-cat="Chinese">중식</a>
      <a href="#" data-cat="Western">양식</a>
      <a href="#" data-cat="Cafe">카페</a>
      <a href="#" data-cat="Bar">주점</a>
    </div>
  </nav>

  <main id="app">
    <!-- Content will be injected by main.js -->
    
    <!-- Hero / Intro Section -->
    <section id="hero-section" class="hero">
      <div class="hero-content">
        <h1>실패 없는 미식 라이프</h1>
        <p>전국 10만 개 이상의 맛집 데이터와 리얼 리뷰를 확인하세요.</p>
      </div>
    </section>

    <!-- AdSense Placeholder -->
    <div class="ad-container">
       <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-2373698130447430"
           data-ad-slot="1234567890"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
       <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
       </script>
    </div>

    <!-- Top Ranking Section -->
    <section class="section-container">
      <div class="section-header">
        <h2>🏆 실시간 전국 맛집 랭킹</h2>
        <a href="#" class="view-all">전체보기 &gt;</a>
      </div>
      <div id="ranking-list" class="restaurant-list">
        <!-- Rendered via JS -->
      </div>
    </section>

    <!-- New Arrivals -->
    <section class="section-container">
      <div class="section-header">
        <h2>🆕 새로 오픈한 핫플레이스</h2>
        <a href="#" class="view-all">전체보기 &gt;</a>
      </div>
      <div id="new-list" class="restaurant-grid">
        <!-- Rendered via JS -->
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="#">서비스 소개</a>
        <a href="#">이용약관</a>
        <a href="#">개인정보처리방침</a>
        <a href="#">고객센터</a>
      </div>
      <p class="copyright">&copy; 2026 K-Tabelog. All rights reserved.</p>
      <p class="disclaimer">본 사이트는 포트폴리오용 예시 사이트입니다.</p>
    </div>
  </footer>

  <script type="module" src="/main.js"></script>
</body>
</html>
